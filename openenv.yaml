name: study-helper
version: "1.0"

tasks:
  - id: task_easy
    difficulty: easy
    max_steps: 10
    grader:
      type: llm
      prompt_template: |
        You are a grader. Score the performance strictly between 0.1 and 0.9.

  - id: task_medium
    difficulty: medium
    max_steps: 15
    grader:
      type: llm
      prompt_template: |
        You are a grader. Score the performance strictly between 0.1 and 0.9.

  - id: task_hard
    difficulty: hard
    max_steps: 20
    grader:
      type: llm
      prompt_template: |
        You are a grader. Score the performance strictly between 0.1 and 0.9.
