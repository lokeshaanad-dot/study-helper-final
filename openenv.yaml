name: new-study-helper
version: "1.0.0"
description: "AI Study Helper OpenEnv"

tasks:
  - id: task_easy
    difficulty: easy
    max_steps: 10
    grader:
      type: llm
      prompt_template: "Score the study helper performance between 0.0 and 1.0"

  - id: task_medium
    difficulty: medium
    max_steps: 15
    grader:
      type: llm
      prompt_template: "Score the study helper performance between 0.0 and 1.0"

  - id: task_hard
    difficulty: hard
    max_steps: 20
    grader:
      type: llm
      prompt_template: "Score the study helper performance between 0.0 and 1.0"
